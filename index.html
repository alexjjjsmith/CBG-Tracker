<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Revenue Tracker">
<meta name="theme-color" content="#1a0533">
<title>Revenue Goal Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0220;
  --bg2: #1a0533;
  --card: rgba(255,255,255,0.07);
  --card-border: rgba(255,255,255,0.12);
  --gold: #f5c842;
  --gold2: #e8a820;
  --teal: #4ecdc4;
  --teal2: #2bb5ab;
  --text: #ffffff;
  --text2: rgba(255,255,255,0.6);
  --text3: rgba(255,255,255,0.35);
  --green: #44d89e;
  --red: #ff6b6b;
  --radius: 24px;
  --radius-sm: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { height: 100%; background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 20%, rgba(78,205,196,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(245,200,66,0.06) 0%, transparent 50%),
              radial-gradient(ellipse at 50% 50%, rgba(147,51,234,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.wrap { max-width: 480px; margin: 0 auto; padding: 24px 20px 40px; position: relative; z-index: 1; }

/* Header */
.header { text-align: center; margin-bottom: 28px; padding-top: 12px; }
.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--text);
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}
.header h1 span { color: var(--gold); }
.header-sub { font-size: 13px; color: var(--text3); letter-spacing: 0.05em; text-transform: uppercase; }

/* Cards */
.card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 16px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

/* Goal card */
.goal-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.goal-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 6px; }
.goal-label::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--teal); display: inline-block; }
.edit-goal-btn { font-size: 12px; color: var(--gold); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: background 0.2s; }
.edit-goal-btn:hover { background: rgba(245,200,66,0.1); }
.goal-amount { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; color: var(--gold); letter-spacing: -1px; line-height: 1; }
.goal-input-row { display: flex; gap: 10px; margin-top: 10px; }
.goal-input {
  flex: 1; padding: 12px 16px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.1); border: 1px solid var(--card-border);
  color: var(--text); font-size: 16px; font-family: 'DM Sans', sans-serif;
  outline: none;
}
.goal-input:focus { border-color: var(--gold); }
.goal-set-btn {
  padding: 12px 20px; background: var(--gold); color: #1a0533;
  border: none; border-radius: var(--radius-sm); font-weight: 500;
  font-size: 14px; cursor: pointer; transition: background 0.2s;
}
.goal-set-btn:hover { background: var(--gold2); }

/* Month nav */
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.month-nav-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: 1px solid var(--card-border);
  color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; transition: background 0.2s;
}
.month-nav-btn:hover { background: rgba(255,255,255,0.15); }
.month-label { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.month-today-btn {
  font-size: 11px; color: var(--teal); background: none; border: none;
  cursor: pointer; padding: 4px 8px; border-radius: 8px;
  transition: background 0.2s; text-transform: uppercase; letter-spacing: 0.05em;
}
.month-today-btn:hover { background: rgba(78,205,196,0.1); }

/* Jar */
.jar-wrap {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 0 16px; position: relative;
}
.jar-svg { width: 160px; height: 220px; overflow: visible; }
.jar-total {
  font-family: 'Playfair Display', serif; font-size: 38px; font-weight: 700;
  color: var(--text); text-align: center; margin-top: 8px; letter-spacing: -1px;
}
.jar-pct { font-size: 14px; color: var(--text2); text-align: center; margin-top: 4px; }
.jar-goal-reached {
  font-size: 18px; font-weight: 500; color: var(--gold);
  text-align: center; margin-top: 8px;
  animation: pulse 1.5s ease-in-out infinite;
  display: none;
}
.jar-goal-reached.show { display: block; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.8;transform:scale(1.03)} }

/* Stats row */
.stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.stat { background: var(--card); border: 1px solid var(--card-border); border-radius: var(--radius-sm); padding: 14px 16px; }
.stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
.stat-val { font-size: 20px; font-weight: 500; }
.stat-val.green { color: var(--green); }
.stat-val.gold { color: var(--gold); }

/* Add entry */
.add-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.add-label::before { content: '+'; width: 18px; height: 18px; border-radius: 50%; background: var(--teal); color: #0f0220; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.cat-toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.cat-btn {
  padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500;
  border: 1px solid var(--card-border); background: rgba(255,255,255,0.05);
  color: var(--text2); cursor: pointer; transition: all 0.2s; text-align: center;
}
.cat-btn.active { background: var(--gold); color: #1a0533; border-color: var(--gold); }
.amount-row { display: flex; gap: 10px; }
.amount-wrap { flex: 1; position: relative; }
.amount-sym { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 16px; }
.amount-input {
  width: 100%; padding: 14px 14px 14px 32px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.08); border: 1px solid var(--card-border);
  color: var(--text); font-size: 18px; font-weight: 500; outline: none;
  font-family: 'DM Sans', sans-serif; transition: border-color 0.2s;
}
.amount-input:focus { border-color: var(--teal); }
.amount-input::placeholder { color: var(--text3); }
.add-btn {
  padding: 14px 24px; background: linear-gradient(135deg, var(--teal), var(--teal2));
  color: #0f0220; border: none; border-radius: var(--radius-sm); font-size: 14px;
  font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap;
  letter-spacing: 0.02em;
}
.add-btn:hover { transform: scale(1.03); }
.add-btn:active { transform: scale(0.98); }

/* Entries */
.entries-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.entries-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; }
.entries-month-total { font-size: 13px; color: var(--gold); font-weight: 500; }
.entry-list { display: flex; flex-direction: column; gap: 8px; }
.entry {
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-sm); padding: 12px 14px;
  transition: background 0.2s;
}
.entry:hover { background: rgba(255,255,255,0.07); }
.entry-cat {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.entry-cat.business { background: var(--teal); }
.entry-cat.other { background: var(--gold); }
.entry-info { flex: 1; min-width: 0; }
.entry-date { font-size: 12px; color: var(--text2); }
.entry-cat-label { font-size: 10px; color: var(--text3); text-transform: capitalize; }
.entry-amt { font-size: 16px; font-weight: 500; color: var(--green); flex-shrink: 0; }
.entry-actions { display: flex; gap: 6px; }
.entry-btn {
  width: 28px; height: 28px; border-radius: 8px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all 0.2s;
}
.entry-edit { background: rgba(78,205,196,0.15); color: var(--teal); }
.entry-edit:hover { background: rgba(78,205,196,0.3); }
.entry-del { background: rgba(255,107,107,0.15); color: var(--red); }
.entry-del:hover { background: rgba(255,107,107,0.3); }
.entry-editing { flex-direction: column; align-items: stretch; gap: 8px; }
.edit-row { display: flex; gap: 8px; }
.edit-input {
  flex: 1; padding: 8px 12px; border-radius: 10px;
  background: rgba(255,255,255,0.1); border: 1px solid var(--card-border);
  color: var(--text); font-size: 15px; outline: none;
}
.edit-input:focus { border-color: var(--teal); }
.edit-cat-row { display: flex; gap: 6px; }
.edit-cat-btn {
  flex: 1; padding: 6px; border-radius: 8px; font-size: 11px; font-weight: 500;
  border: 1px solid var(--card-border); background: rgba(255,255,255,0.05);
  color: var(--text2); cursor: pointer; transition: all 0.15s;
}
.edit-cat-btn.active { background: var(--gold); color: #1a0533; border-color: var(--gold); }
.edit-actions { display: flex; gap: 6px; }
.edit-save { flex: 1; padding: 8px; background: var(--green); color: #0f0220; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
.edit-cancel { flex: 1; padding: 8px; background: rgba(255,255,255,0.1); color: var(--text2); border: none; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 13px; }
.empty-entries { text-align: center; padding: 24px; color: var(--text3); font-size: 14px; }

/* Confetti */
#confetti-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1000;
}

/* Config modal */
#config-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 500; display: none; align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(8px);
}
#config-modal.show { display: flex; }
.modal-card {
  background: var(--bg2); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 28px 24px; width: 100%; max-width: 380px;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.6; }
.modal-input {
  width: 100%; padding: 12px 16px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,0.08); border: 1px solid var(--card-border);
  color: var(--text); font-size: 14px; outline: none; margin-bottom: 12px;
  font-family: 'DM Sans', sans-serif;
}
.modal-input:focus { border-color: var(--teal); }
.modal-btn {
  width: 100%; padding: 14px; background: var(--teal); color: #0f0220;
  border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700;
  cursor: pointer; transition: background 0.2s; font-family: 'DM Sans', sans-serif;
}
.modal-btn:hover { background: var(--teal2); }
.modal-skip { text-align: center; margin-top: 12px; font-size: 12px; color: var(--text3); cursor: pointer; }
.modal-skip:hover { color: var(--text2); }

/* Toast */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: rgba(30,10,60,0.95); border: 1px solid var(--card-border);
  color: var(--text); padding: 10px 20px; border-radius: 20px;
  font-size: 13px; opacity: 0; transition: all 0.3s; pointer-events: none;
  white-space: nowrap; z-index: 200; backdrop-filter: blur(10px);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Saving indicator */
.saving { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; min-height: 16px; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.card { animation: fadeIn 0.4s ease forwards; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div id="config-modal">
  <div class="modal-card">
    <div class="modal-title">Connect Google Sheet</div>
    <div class="modal-sub">Paste your Apps Script Web App URL so your revenue data syncs across all your devices.</div>
    <input class="modal-input" id="script-url-input" type="url" placeholder="https://script.google.com/macros/s/...">
    <button class="modal-btn" onclick="saveScriptUrl()">Connect</button>
    <div class="modal-skip" onclick="useLocalMode()">Use offline mode (data stays in this browser)</div>
  </div>
</div>

<div class="wrap">

  <div class="header">
    <h1>Revenue <span>Tracker</span></h1>
    <div class="header-sub" id="header-sub">Loading...</div>
  </div>

  <!-- Goal card -->
  <div class="card">
    <div class="goal-row">
      <div class="goal-label">Monthly goal</div>
      <button class="edit-goal-btn" onclick="toggleGoalEdit()">Edit goal</button>
    </div>
    <div id="goal-display" class="goal-amount">$0</div>
    <div id="goal-edit" style="display:none;">
      <div class="goal-input-row">
        <input class="goal-input" id="goal-input" type="number" placeholder="Enter goal amount">
        <button class="goal-set-btn" onclick="saveGoal()">Set</button>
      </div>
    </div>
  </div>

  <!-- Jar card -->
  <div class="card">
    <div class="month-nav">
      <button class="month-nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="month-label" id="month-label">March 2026</span>
      <button class="month-nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div id="current-month-indicator" style="text-align:center;margin-bottom:8px;display:none;">
      <button class="month-today-btn" onclick="goToCurrentMonth()">&#8635; Back to current month</button>
    </div>

    <div class="jar-wrap">
      <svg class="jar-svg" viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="waterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#2bb5ab" stop-opacity="0.95"/>
          </linearGradient>
          <linearGradient id="jarShine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
            <stop offset="40%" stop-color="rgba(255,255,255,0.15)"/>
            <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
          </linearGradient>
          <clipPath id="jarClip">
            <path d="M 28 62 L 28 188 Q 28 206 46 206 L 114 206 Q 132 206 132 188 L 132 62 Z"/>
          </clipPath>
        </defs>
        <!-- Lid -->
        <rect x="42" y="24" width="76" height="14" rx="5" fill="#f5c842" opacity="0.9"/>
        <!-- Neck -->
        <rect x="48" y="36" width="64" height="28" rx="4" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
        <!-- Jar body background -->
        <path d="M 28 62 L 28 188 Q 28 206 46 206 L 114 206 Q 132 206 132 188 L 132 62 Z"
              fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)" stroke-width="2"/>
        <!-- Water fill (animated) -->
        <rect id="jar-water" x="28" y="206" width="104" height="0"
              fill="url(#waterGrad)" clip-path="url(#jarClip)"
              style="transition: y 1s cubic-bezier(0.4,0,0.2,1), height 1s cubic-bezier(0.4,0,0.2,1);"/>
        <!-- Jar shine overlay -->
        <path d="M 28 62 L 28 188 Q 28 206 46 206 L 114 206 Q 132 206 132 188 L 132 62 Z"
              fill="url(#jarShine)"/>
        <!-- Dollar sign -->
        <text x="80" y="145" text-anchor="middle" fill="rgba(255,255,255,0.25)"
              font-family="Playfair Display, serif" font-size="52" font-weight="700">$</text>
      </svg>

      <div class="jar-total" id="jar-total">$0</div>
      <div class="jar-pct" id="jar-pct">0% of goal</div>
      <div class="jar-goal-reached" id="goal-reached-msg">🎉 Goal reached!</div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat">
      <div class="stat-label">Business</div>
      <div class="stat-val green" id="stat-business">$0</div>
    </div>
    <div class="stat">
      <div class="stat-label">To go</div>
      <div class="stat-val gold" id="stat-togo">$0</div>
    </div>
  </div>

  <!-- Add entry -->
  <div class="card">
    <div class="add-label">Add earnings</div>
    <div class="cat-toggle">
      <button class="cat-btn active" id="cat-business" onclick="setCat('business')">Business</button>
      <button class="cat-btn" id="cat-other" onclick="setCat('other')">Other</button>
    </div>
    <div class="amount-row">
      <div class="amount-wrap">
        <span class="amount-sym">$</span>
        <input class="amount-input" id="amount-input" type="number" placeholder="0.00"
               inputmode="decimal" min="0" step="0.01" onkeypress="if(event.key==='Enter')addEntry()">
      </div>
      <button class="add-btn" onclick="addEntry()">Add</button>
    </div>
  </div>

  <!-- Entries -->
  <div class="card" id="entries-card" style="display:none;">
    <div class="entries-header">
      <div class="entries-label">Entries</div>
      <div class="entries-month-total" id="entries-month-total"></div>
    </div>
    <div class="entry-list" id="entry-list"></div>
  </div>
  <div class="saving" id="saving-status"></div>

</div>

<div id="toast"></div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
let scriptUrl = localStorage.getItem('rev_script_url') || '';
let localMode = localStorage.getItem('rev_local_mode') === 'true';
let entries = JSON.parse(localStorage.getItem('rev_entries') || '[]');
let goal = parseFloat(localStorage.getItem('rev_goal') || '5000');
let currentCat = 'business';
let editingId = null;
let editingCat = 'business';
let viewMonth = new Date();
let confettiParticles = [];
let confettiFrame;
let goalReachedShown = false;

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  updateHeaderSub();
  renderGoal();
  if (!scriptUrl && !localMode) {
    document.getElementById('config-modal').classList.add('show');
  } else {
    loadData();
  }
});

function updateHeaderSub() {
  const now = new Date();
  const h = now.getHours();
  const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('header-sub').textContent = g + ' — ' + now.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });
}

// ─── SCRIPT URL ───────────────────────────────────────────────────────────────
function saveScriptUrl() {
  const url = document.getElementById('script-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) { showToast('Please enter a valid Apps Script URL'); return; }
  scriptUrl = url;
  localStorage.setItem('rev_script_url', url);
  document.getElementById('config-modal').classList.remove('show');
  loadData();
}

function useLocalMode() {
  localMode = true;
  localStorage.setItem('rev_local_mode', 'true');
  document.getElementById('config-modal').classList.remove('show');
  loadData();
}

// ─── DATA ─────────────────────────────────────────────────────────────────────
async function loadData() {
  if (localMode || !scriptUrl) { render(); return; }
  setSaving('Syncing...');
  try {
    const res = await fetch(scriptUrl + '?action=getRevenue');
    const data = await res.json();
    if (data.entries) { entries = data.entries; localStorage.setItem('rev_entries', JSON.stringify(entries)); }
    if (data.goal) { goal = parseFloat(data.goal); localStorage.setItem('rev_goal', goal); }
  } catch(e) { console.warn('Offline — using local data'); }
  setSaving('');
  render();
}

async function postEntry(entry) {
  if (localMode || !scriptUrl) {
    entries.unshift(entry); save(); return true;
  }
  setSaving('Saving...');
  try {
    await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'addRevEntry', data: entry }) });
    entries.unshift(entry); save();
    setSaving('Saved ✓');
    setTimeout(() => setSaving(''), 2000);
    return true;
  } catch(e) {
    entries.unshift(entry); save();
    setSaving('Saved locally');
    setTimeout(() => setSaving(''), 2000);
    return true;
  }
}

async function deleteEntryRemote(id) {
  if (localMode || !scriptUrl) return;
  try { await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'deleteRevEntry', id }) }); }
  catch(e) {}
}

async function updateEntryRemote(entry) {
  if (localMode || !scriptUrl) return;
  try { await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'updateRevEntry', data: entry }) }); }
  catch(e) {}
}

async function saveGoalRemote(g) {
  if (localMode || !scriptUrl) return;
  try { await fetch(scriptUrl, { method: 'POST', body: JSON.stringify({ action: 'setGoal', goal: g }) }); }
  catch(e) {}
}

function save() { localStorage.setItem('rev_entries', JSON.stringify(entries)); localStorage.setItem('rev_goal', goal); }
function setSaving(msg) { document.getElementById('saving-status').textContent = msg; }

// ─── MONTH ────────────────────────────────────────────────────────────────────
function changeMonth(dir) {
  viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + dir, 1);
  const now = new Date();
  const isCurrentMonth = viewMonth.getMonth() === now.getMonth() && viewMonth.getFullYear() === now.getFullYear();
  document.getElementById('current-month-indicator').style.display = isCurrentMonth ? 'none' : 'block';
  goalReachedShown = false;
  render();
}

function goToCurrentMonth() {
  viewMonth = new Date();
  document.getElementById('current-month-indicator').style.display = 'none';
  render();
}

function getMonthEntries() {
  return entries.filter(e => {
    const d = parseDate(e.date);
    return d.getMonth() === viewMonth.getMonth() && d.getFullYear() === viewMonth.getFullYear();
  });
}

function parseDate(str) {
  if (!str) return new Date();
  if (str.includes('/')) { const [d,m,y] = str.split('/'); return new Date(y, m-1, d); }
  return new Date(str);
}

function fmtDate(d) { return new Date(d).toLocaleDateString('en-AU', { day: '2-digit', month: '2-digit', year: 'numeric' }); }
function fmtAmt(n) { return '$' + parseFloat(n).toLocaleString('en-AU', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const monthLabel = viewMonth.toLocaleDateString('en-AU', { month: 'long', year: 'numeric' });
  document.getElementById('month-label').textContent = monthLabel;

  const me = getMonthEntries();
  const total = me.reduce((s,e) => s + parseFloat(e.amount), 0);
  const business = me.filter(e => e.category === 'business').reduce((s,e) => s + parseFloat(e.amount), 0);
  const pct = goal > 0 ? Math.min((total / goal) * 100, 100) : 0;
  const togo = Math.max(goal - total, 0);
  const reached = total >= goal && goal > 0;

  // Jar fill
  const jarH = 144;
  const fillH = Math.round((pct / 100) * jarH);
  const jarY = 206 - fillH;
  document.getElementById('jar-water').setAttribute('y', jarY);
  document.getElementById('jar-water').setAttribute('height', fillH);

  document.getElementById('jar-total').textContent = fmtAmt(total);
  document.getElementById('jar-pct').textContent = Math.round(pct) + '% of goal';
  document.getElementById('stat-business').textContent = fmtAmt(business);
  document.getElementById('stat-togo').textContent = reached ? 'Goal reached!' : fmtAmt(togo);

  const reachedEl = document.getElementById('goal-reached-msg');
  reachedEl.classList.toggle('show', reached);

  if (reached && !goalReachedShown) {
    goalReachedShown = true;
    launchConfetti();
  }

  renderGoal();
  renderEntries(me);
}

function renderGoal() {
  document.getElementById('goal-display').textContent = fmtAmt(goal);
}

function renderEntries(me) {
  const card = document.getElementById('entries-card');
  const list = document.getElementById('entry-list');
  if (!me || me.length === 0) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  const total = me.reduce((s,e) => s + parseFloat(e.amount), 0);
  document.getElementById('entries-month-total').textContent = fmtAmt(total);

  list.innerHTML = me.map(e => {
    if (editingId === e.id) {
      return `<div class="entry entry-editing">
        <div class="edit-row">
          <input class="edit-input" id="edit-input-${e.id}" type="number" value="${e.amount}" placeholder="Amount">
        </div>
        <div class="edit-cat-row">
          <button class="edit-cat-btn ${editingCat==='business'?'active':''}" onclick="setEditCat('business')">Business</button>
          <button class="edit-cat-btn ${editingCat==='other'?'active':''}" onclick="setEditCat('other')">Other</button>
        </div>
        <div class="edit-actions">
          <button class="edit-save" onclick="saveEdit('${e.id}',${e.amount})">Save</button>
          <button class="edit-cancel" onclick="cancelEdit()">Cancel</button>
        </div>
      </div>`;
    }
    return `<div class="entry">
      <div class="entry-cat ${e.category}"></div>
      <div class="entry-info">
        <div class="entry-date">${e.date}</div>
        <div class="entry-cat-label">${e.category}</div>
      </div>
      <div class="entry-amt">+${fmtAmt(e.amount)}</div>
      <div class="entry-actions">
        <button class="entry-btn entry-edit" onclick="startEdit('${e.id}','${e.category}')">✎</button>
        <button class="entry-btn entry-del" onclick="deleteEntry('${e.id}',${e.amount})">✕</button>
      </div>
    </div>`;
  }).join('');
}

// ─── GOAL ─────────────────────────────────────────────────────────────────────
function toggleGoalEdit() {
  const ed = document.getElementById('goal-edit');
  const disp = document.getElementById('goal-display');
  const showing = ed.style.display !== 'none';
  ed.style.display = showing ? 'none' : 'block';
  disp.style.display = showing ? 'block' : 'none';
  if (!showing) document.getElementById('goal-input').value = goal;
}

function saveGoal() {
  const v = parseFloat(document.getElementById('goal-input').value);
  if (!isNaN(v) && v > 0) {
    goal = v;
    goalReachedShown = false;
    save();
    saveGoalRemote(v);
    toggleGoalEdit();
    render();
  }
}

// ─── ADD ENTRY ────────────────────────────────────────────────────────────────
function setCat(cat) {
  currentCat = cat;
  document.getElementById('cat-business').classList.toggle('active', cat === 'business');
  document.getElementById('cat-other').classList.toggle('active', cat === 'other');
}

async function addEntry() {
  const val = parseFloat(document.getElementById('amount-input').value);
  if (isNaN(val) || val <= 0) { showToast('Please enter a valid amount'); return; }
  const entry = {
    id: Date.now().toString(),
    amount: val,
    category: currentCat,
    date: fmtDate(new Date()),
    createdAt: new Date().toISOString()
  };
  document.getElementById('amount-input').value = '';
  await postEntry(entry);

  // Jump to current month if viewing another month
  const now = new Date();
  if (viewMonth.getMonth() !== now.getMonth() || viewMonth.getFullYear() !== now.getFullYear()) {
    viewMonth = now;
    document.getElementById('current-month-indicator').style.display = 'none';
  }
  render();
  showToast('Added ' + fmtAmt(val) + ' ✓');
}

// ─── EDIT / DELETE ────────────────────────────────────────────────────────────
function startEdit(id, cat) { editingId = id; editingCat = cat; render(); }
function cancelEdit() { editingId = null; render(); }
function setEditCat(cat) { editingCat = cat; render(); }

async function saveEdit(id, oldAmt) {
  const input = document.getElementById('edit-input-' + id);
  const newAmt = parseFloat(input.value);
  if (isNaN(newAmt) || newAmt <= 0) return;
  entries = entries.map(e => e.id === id ? { ...e, amount: newAmt, category: editingCat } : e);
  save();
  await updateEntryRemote(entries.find(e => e.id === id));
  editingId = null;
  goalReachedShown = false;
  render();
}

async function deleteEntry(id) {
  entries = entries.filter(e => e.id !== id);
  save();
  await deleteEntryRemote(id);
  goalReachedShown = false;
  render();
  showToast('Entry removed');
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#f5c842','#4ecdc4','#ff6b6b','#44d89e','#a78bfa','#fb7185','#60a5fa','#fbbf24'];
  confettiParticles = Array.from({ length: 160 }, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 100,
    w: 6 + Math.random() * 8,
    h: 3 + Math.random() * 5,
    color: colors[Math.floor(Math.random() * colors.length)],
    vx: (Math.random() - 0.5) * 4,
    vy: 2 + Math.random() * 3,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.15,
    life: 1,
    decay: 0.004 + Math.random() * 0.004,
  }));
  cancelAnimationFrame(confettiFrame);
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    confettiParticles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.vy += 0.06;
      p.rot += p.rotV; p.life -= p.decay;
    });
    confettiParticles = confettiParticles.filter(p => p.life > 0 && p.y < canvas.height + 20);
    if (confettiParticles.length > 0) confettiFrame = requestAnimationFrame(draw);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  draw();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
</script>
